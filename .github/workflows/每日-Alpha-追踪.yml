name: 每日 Alpha 追踪 (发现与同步)

on:
  schedule:
    # 每天 UTC 0:00, 6:00, 12:00, 18:00 (北京时间 8:00, 14:00, 20:00, 次日 2:00)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Manual Trigger Task'
        required: true
        default: 'daily_sync'
        type: choice
        options:
        - daily_sync
        - fetch_trending
        - update_metrics

jobs:
  daily-tasks:
    runs-on: ubuntu-latest
    env:
      # Database Connections
      TIDB_SOURCE_URL: ${{ secrets.TIDB_SOURCE_URL }}
      TIDB_RELATION_URL: ${{ secrets.TIDB_RELATION_URL }}
      TIDB_INSIGHT_URL: ${{ secrets.TIDB_INSIGHT_URL }}
      
      # SSL Mode (optional override)
      TIDB_SOURCE_SSL: ${{ secrets.TIDB_SOURCE_SSL || 'REQUIRED' }}
      TIDB_RELATION_SSL: ${{ secrets.TIDB_RELATION_SSL || 'REQUIRED' }}
      TIDB_INSIGHT_SSL: ${{ secrets.TIDB_INSIGHT_SSL || 'REQUIRED' }}
      
      # GitHub API
      GH_TOKEN_POOL: ${{ secrets.GH_TOKEN_POOL }}
      
      # BigQuery
      GCP_B64_CREDENTIALS: ${{ secrets.GCP_B64_CREDENTIALS }}
      
      # LLM API
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL_NAME: ${{ secrets.OPENAI_MODEL_NAME }}
      
      # Report Specialized LLM
      REPORT_LLM_API_KEY: ${{ secrets.REPORT_LLM_API_KEY }}
      REPORT_LLM_BASE_URL: ${{ secrets.REPORT_LLM_BASE_URL }}
      REPORT_LLM_MODEL_NAME: ${{ secrets.REPORT_LLM_MODEL_NAME }}

      # Intent Analysis Specialized LLM
      INTENT_LLM_API_KEY: ${{ secrets.INTENT_LLM_API_KEY }}
      INTENT_LLM_BASE_URL: ${{ secrets.INTENT_LLM_BASE_URL }}
      INTENT_LLM_MODEL_NAME: ${{ secrets.INTENT_LLM_MODEL_NAME }}
      
      # Notion
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
      
      # Timezone
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (if needed for stealth crawler)
        run: playwright install --with-deps chromium

      - name: Generate GCP Credentials File
        if: env.GCP_B64_CREDENTIALS != ''
        run: |
          echo "${{ secrets.GCP_B64_CREDENTIALS }}" | base64 -d > gcp-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-credentials.json" >> $GITHUB_ENV

      - name: Run Daily Task
        run: |
          TASK_NAME="${{ github.event.inputs.task || 'daily_sync' }}"
          echo "Starting task: $TASK_NAME at $(date)"
          python main.py --task $TASK_NAME